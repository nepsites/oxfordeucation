<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2a"/>
      <stop offset="40%" stop-color="#1a1050"/>
      <stop offset="80%" stop-color="#4a2060"/>
      <stop offset="100%" stop-color="#8b1a3a"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="20%" stop-color="#c0c0d8"/>
      <stop offset="60%" stop-color="#3a3a6a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity=".9"/>
  <circle cx="120" cy="50" r="1" fill="white" opacity=".7"/>
  <circle cx="200" cy="20" r="2" fill="white" opacity=".8"/>
  <circle cx="320" cy="35" r="1.5" fill="white" opacity=".9"/>
  <circle cx="450" cy="15" r="1" fill="white" opacity=".6"/>
  <circle cx="550" cy="40" r="2" fill="white" opacity=".8"/>
  <circle cx="620" cy="25" r="1.5" fill="white" opacity=".7"/>
  <circle cx="680" cy="50" r="1" fill="white" opacity=".9"/>
  <circle cx="160" cy="70" r="1" fill="white" opacity=".5"/>
  <circle cx="480" cy="65" r="1.5" fill="white" opacity=".7"/>
  <!-- Moon -->
  <circle cx="80" cy="70" r="32" fill="#f0f0e8" opacity=".9"/>
  <circle cx="92" cy="62" r="28" fill="#4a2060"/>
  <!-- Aurora-like glow -->
  <ellipse cx="350" cy="200" rx="300" ry="80" fill="#8b1a3a" opacity=".15"/>
  <!-- Mount Fuji -->
  <polygon points="350,30 100,270 600,270" fill="url(#mtn)"/>
  <!-- Snow cap -->
  <polygon points="350,30 295,130 405,130" fill="white" opacity=".95"/>
  <polygon points="295,130 260,170 440,170 405,130" fill="white" opacity=".7"/>
  <!-- Treeline -->
  <rect x="100" y="265" width="500" height="20" fill="#0d1a0d" opacity=".9"/>
  <!-- Lake -->
  <ellipse cx="350" cy="320" rx="280" ry="55" fill="url(#lake)"/>
  <!-- Fuji reflection in lake -->
  <polygon points="350,360 200,310 500,310" fill="#1a1040" opacity=".5"/>
  <polygon points="350,360 295,325 405,325" fill="white" opacity=".2"/>
  <!-- Cherry blossom trees (silhouette) -->
  <rect x="90" y="250" width="5" height="20" fill="#1a0a10"/>
  <ellipse cx="92" cy="242" rx="14" ry="12" fill="#c06080" opacity=".8"/>
  <rect x="110" y="255" width="5" height="15" fill="#1a0a10"/>
  <ellipse cx="112" cy="247" rx="12" ry="10" fill="#d07090" opacity=".8"/>
  <rect x="575" y="250" width="5" height="20" fill="#1a0a10"/>
  <ellipse cx="577" cy="242" rx="14" ry="12" fill="#c06080" opacity=".8"/>
  <rect x="595" y="255" width="5" height="15" fill="#1a0a10"/>
  <ellipse cx="597" cy="247" rx="12" ry="10" fill="#d07090" opacity=".8"/>
  <!-- Pagoda silhouette -->
  <rect x="570" y="230" width="18" height="30" fill="#0a0a1a"/>
  <polygon points="561,232 597,232 579,220" fill="#0a0a1a"/>
  <rect x="566" y="218" width="26" height="4" fill="#0a0a1a"/>
  <polygon points="567,218 611,218 589,205" fill="#0a0a1a"/>
  <rect x="572" y="203" width="14" height="4" fill="#0a0a1a"/>
  <polygon points="574,203 604,203 589,192" fill="#0a0a1a"/>
  <rect x="587" y="188" width="3" height="14" fill="#0a0a1a"/>

</svg>