<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050518"/>
      <stop offset="50%" stop-color="#0d0d35"/>
      <stop offset="100%" stop-color="#1a1050"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#050d05"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="70" cy="30" r="1.5" fill="white" opacity=".8"/>
  <circle cx="170" cy="18" r="1" fill="white" opacity=".7"/>
  <circle cx="250" cy="45" r="2" fill="white" opacity=".9"/>
  <circle cx="420" cy="22" r="1.5" fill="white" opacity=".7"/>
  <circle cx="540" cy="38" r="1" fill="white" opacity=".8"/>
  <circle cx="640" cy="25" r="2" fill="white" opacity=".7"/>
  <circle cx="490" cy="55" r="1" fill="white" opacity=".6"/>
  <!-- Moon -->
  <circle cx="600" cy="70" r="28" fill="#e8e8d0" opacity=".9"/>
  <circle cx="612" cy="62" r="24" fill="#0d0d35"/>
  <!-- Namsan Hill -->
  <ellipse cx="350" cy="340" rx="350" ry="120" fill="url(#hill)"/>
  <!-- N Seoul Tower -->
  <!-- Tower base/observation deck -->
  <rect x="330" y="195" width="40" height="60" fill="#1a1a35" rx="4"/>
  <rect x="322" y="190" width="56" height="10" fill="#2a2a45" rx="3"/>
  <!-- Tower shaft -->
  <rect x="342" y="90" width="16" height="105" fill="#2a2a45"/>
  <!-- Antenna -->
  <rect x="347" y="30" width="6" height="62" fill="#1a1a35"/>
  <rect x="345" y="28" width="10" height="5" fill="#3a3a55" rx="2"/>
  <!-- Observation deck windows -->
  <rect x="334" y="200" width="8" height="10" fill="#f5d280" opacity=".8" rx="1"/>
  <rect x="347" y="200" width="8" height="10" fill="#f5d280" opacity=".8" rx="1"/>
  <rect x="360" y="200" width="8" height="10" fill="#f5d280" opacity=".7" rx="1"/>
  <!-- Tower glow -->
  <ellipse cx="350" cy="225" rx="50" ry="30" fill="#e060a0" opacity=".1"/>
  <rect x="342" y="90" width="16" height="105" fill="#e060a0" opacity=".07"/>
  <!-- Seoul skyline -->
  <rect x="0" y="230" width="70" height="190" fill="#0a0a18"/>
  <rect x="80" y="210" width="55" height="210" fill="#0d0d20"/>
  <rect x="145" y="200" width="45" height="220" fill="#0a0a18"/>
  <rect x="150" y="180" width="35" height="22" fill="#0a0a18"/>
  <rect x="200" y="220" width="60" height="200" fill="#0d0d20"/>
  <rect x="270" y="240" width="40" height="180" fill="#0a0a18"/>
  <rect x="420" y="235" width="50" height="185" fill="#0a0a18"/>
  <rect x="480" y="205" width="70" height="215" fill="#0d0d20"/>
  <rect x="560" y="220" width="55" height="200" fill="#0a0a18"/>
  <rect x="625" y="240" width="75" height="180" fill="#0d0d20"/>
  <!-- Building windows -->
  <rect x="90" y="220" width="5" height="5" fill="#e060a0" opacity=".6"/>
  <rect x="100" y="220" width="5" height="5" fill="#60a0e0" opacity=".5"/>
  <rect x="155" y="190" width="5" height="5" fill="#e060a0" opacity=".7"/>
  <rect x="490" y="215" width="5" height="5" fill="#60a0e0" opacity=".6"/>
  <rect x="503" y="215" width="5" height="5" fill="#e060a0" opacity=".5"/>
  <rect x="570" y="230" width="5" height="5" fill="#60a0e0" opacity=".7"/>
  <!-- Ground lights -->
  <ellipse cx="350" cy="350" rx="200" ry="15" fill="#f5d280" opacity=".08"/>

</svg>