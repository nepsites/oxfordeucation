<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">

  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="60%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#2e5a9e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="60" cy="40" r="1.5" fill="white" opacity=".7"/>
  <circle cx="150" cy="25" r="1" fill="white" opacity=".6"/>
  <circle cx="280" cy="50" r="1.5" fill="white" opacity=".8"/>
  <circle cx="400" cy="30" r="1" fill="white" opacity=".5"/>
  <circle cx="550" cy="20" r="2" fill="white" opacity=".7"/>
  <circle cx="640" cy="55" r="1.5" fill="white" opacity=".6"/>
  <circle cx="490" cy="45" r="1" fill="white" opacity=".8"/>
  <!-- Skyline buildings -->
  <rect x="0" y="220" width="80" height="200" fill="#0a1628" opacity=".9"/>
  <rect x="20" y="180" width="30" height="40" fill="#0a1628" opacity=".9"/>
  <rect x="90" y="170" width="50" height="250" fill="#0f1e38"/>
  <rect x="105" y="150" width="20" height="20" fill="#0f1e38"/>
  <rect x="150" y="200" width="60" height="220" fill="#0a1628"/>
  <rect x="220" y="160" width="70" height="260" fill="#0d1f3c"/>
  <rect x="240" y="130" width="30" height="30" fill="#0d1f3c"/>
  <!-- Empire State Building style -->
  <rect x="300" y="100" width="60" height="320" fill="#111d35"/>
  <rect x="315" y="70" width="30" height="30" fill="#111d35"/>
  <rect x="323" y="45" width="14" height="25" fill="#111d35"/>
  <rect x="329" y="20" width="2" height="25" fill="#aaa"/>
  <rect x="370" y="150" width="50" height="270" fill="#0a1628"/>
  <rect x="430" y="190" width="80" height="230" fill="#0d1f3c"/>
  <rect x="520" y="170" width="55" height="250" fill="#0a1628"/>
  <rect x="580" y="210" width="80" height="210" fill="#0d1f3c"/>
  <rect x="650" y="230" width="50" height="190" fill="#0a1628"/>
  <!-- Windows (lit) -->
  <rect x="225" y="170" width="5" height="5" fill="#f5d280" opacity=".8"/>
  <rect x="235" y="170" width="5" height="5" fill="#f5d280" opacity=".8"/>
  <rect x="225" y="185" width="5" height="5" fill="#f5d280" opacity=".6"/>
  <rect x="305" y="110" width="5" height="5" fill="#f5d280" opacity=".7"/>
  <rect x="315" y="110" width="5" height="5" fill="#f5d280" opacity=".7"/>
  <rect x="345" y="160" width="5" height="5" fill="#f5d280" opacity=".7"/>
  <rect x="435" y="200" width="5" height="5" fill="#f5d280" opacity=".8"/>
  <rect x="450" y="200" width="5" height="5" fill="#f5d280" opacity=".6"/>
  <rect x="525" y="180" width="5" height="5" fill="#f5d280" opacity=".7"/>
  <!-- Water reflection -->
  <rect x="0" y="360" width="700" height="60" fill="url(#water)" opacity=".7"/>
  <!-- Moon -->
  <circle cx="600" cy="60" r="28" fill="#e8e8d0" opacity=".9"/>
  <circle cx="612" cy="52" r="24" fill="#1a3a6b"/>

</svg>